<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LittleWords – Animales</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --tangerine: #F97B4B;
    --mango: #FFB347;
    --bubblegum: #FF8FAB;
    --mint: #72D6C9;
    --cream: #FFFBF5;
    --cacao: #3D2A1E;
    --cat-domesticos: #FF8FAB;
    --cat-granja: #FFB347;
    --cat-salvajes: #F97B4B;
    --cat-grandes: #C084FC;
    --cat-aves: #72D6C9;
    --cat-marinos: #60A5FA;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--cream);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, #FFB34740 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -60px; left: -60px;
    width: 250px; height: 250px;
    background: radial-gradient(circle, #72D6C940 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    width: 100%;
    max-width: 480px;
    padding: 20px 24px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--cacao);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--tangerine); }

  .set-badge {
    background: var(--cacao);
    color: var(--cream);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Lang toggle */
  .lang-toggle {
    width: 100%;
    max-width: 480px;
    padding: 0 24px 16px;
    display: flex;
    gap: 8px;
    position: relative;
    z-index: 10;
  }
  .lang-btn {
    flex: 1;
    padding: 8px;
    border: 2px solid transparent;
    border-radius: 12px;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--cacao);
    opacity: 0.5;
  }
  .lang-btn.active {
    border-color: var(--tangerine);
    background: white;
    opacity: 1;
    color: var(--tangerine);
  }
  .lang-btn:hover { opacity: 0.8; }

  /* Category filter */
  .category-scroll {
    width: 100%;
    max-width: 480px;
    padding: 0 24px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 10;
  }
  .category-scroll::-webkit-scrollbar { display: none; }

  .cat-chip {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    background: white;
    color: var(--cacao);
    opacity: 0.6;
  }
  .cat-chip.active {
    opacity: 1;
    color: white;
  }
  .cat-chip[data-cat="all"].active { background: var(--cacao); }
  .cat-chip[data-cat="Domésticos"].active { background: var(--cat-domesticos); }
  .cat-chip[data-cat="Granja"].active { background: var(--cat-granja); }
  .cat-chip[data-cat="Salvajes"].active { background: var(--cat-salvajes); }
  .cat-chip[data-cat="Grandes"].active { background: var(--cat-grandes); }
  .cat-chip[data-cat="Aves"].active { background: var(--cat-aves); }
  .cat-chip[data-cat="Marinos"].active { background: var(--cat-marinos); }

  /* Card area */
  .card-area {
    width: 100%;
    max-width: 480px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 10;
    flex: 1;
  }

  /* Counter */
  .counter {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--cacao);
    opacity: 0.4;
    margin-bottom: 12px;
    align-self: flex-end;
  }

  /* Flip card */
  .flip-wrapper {
    width: 100%;
    perspective: 1200px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .flip-card {
    width: 100%;
    aspect-ratio: 3/2;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 28px;
  }

  .flip-card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-shadow: 0 8px 40px rgba(61,42,30,0.10), 0 2px 8px rgba(61,42,30,0.06);
  }

  .card-front {
    background: white;
  }

  .card-back {
    transform: rotateY(180deg);
    background: white;
  }

  /* Emoji */
  .card-emoji {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 16px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
    transition: transform 0.3s;
  }
  .flip-wrapper:hover .card-emoji { transform: scale(1.05); }

  .card-name-es {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 32px;
    color: var(--cacao);
    text-align: center;
    line-height: 1.1;
  }

  .card-category-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 12px;
  }

  /* Back side */
  .card-name-en {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: var(--cacao);
    text-align: center;
  }

  .card-phonetic {
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: var(--cacao);
    opacity: 0.45;
    margin-top: 4px;
    margin-bottom: 16px;
  }

  .card-fun-fact {
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--cacao);
    opacity: 0.6;
    text-align: center;
    max-width: 220px;
    line-height: 1.5;
  }

  /* Flip hint */
  .flip-hint {
    font-size: 11px;
    font-family: 'Poppins', sans-serif;
    color: var(--cacao);
    opacity: 0.35;
    margin-top: -8px;
    margin-bottom: 8px;
  }

  /* Audio button */
  .audio-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    width: 100%;
    justify-content: center;
  }

  .audio-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 50px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .audio-btn-es {
    background: var(--bubblegum);
    color: white;
  }

  .audio-btn-en {
    background: var(--mint);
    color: var(--cacao);
  }

  .audio-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .audio-btn:active { transform: translateY(0); }

  .audio-btn.playing {
    animation: pulse-btn 0.6s ease-in-out infinite alternate;
  }

  @keyframes pulse-btn {
    from { transform: scale(1); }
    to { transform: scale(1.04); }
  }

  .audio-icon {
    font-size: 18px;
    display: flex;
    align-items: center;
  }

  /* Sound wave animation */
  .wave {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 18px;
  }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: currentColor;
    animation: wave-anim 0.8s ease-in-out infinite alternate;
  }
  .wave-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 10px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 16px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 8px; animation-delay: 0.15s; }

  @keyframes wave-anim {
    from { transform: scaleY(0.5); }
    to { transform: scaleY(1); }
  }

  .wave-static {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 18px;
  }
  .wave-static .wb {
    width: 3px;
    border-radius: 2px;
    background: currentColor;
  }
  .wave-static .wb:nth-child(1) { height: 6px; }
  .wave-static .wb:nth-child(2) { height: 12px; }
  .wave-static .wb:nth-child(3) { height: 9px; }
  .wave-static .wb:nth-child(4) { height: 14px; }
  .wave-static .wb:nth-child(5) { height: 7px; }

  /* Navigation */
  .nav-row {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    justify-content: center;
    margin-bottom: 24px;
  }

  .nav-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(61,42,30,0.12);
    background: white;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--cacao);
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--tangerine);
    color: var(--tangerine);
    transform: scale(1.05);
  }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 200px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(61,42,30,0.15);
    transition: all 0.3s;
    cursor: pointer;
  }
  .dot.active { background: var(--tangerine); transform: scale(1.3); }
  .dot.seen { background: rgba(61,42,30,0.35); }

  /* Card enter animation */
  @keyframes card-enter {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-enter { animation: card-enter 0.35s ease-out forwards; }

  /* Color accents per category */
  .accent-domesticos { --accent: var(--cat-domesticos); }
  .accent-granja { --accent: var(--cat-granja); }
  .accent-salvajes { --accent: var(--cat-salvajes); }
  .accent-grandes { --accent: var(--cat-grandes); }
  .accent-aves { --accent: var(--cat-aves); }
  .accent-marinos { --accent: var(--cat-marinos); }

  .card-back { border-top: 5px solid var(--accent, var(--tangerine)); }
  .card-front { border-top: 5px solid var(--accent, var(--tangerine)); }
</style>
</head>
<body>

<header>
  <div class="logo">Little<span>Words</span></div>
  <div class="set-badge">SET 01 · ANIMALES</div>
</header>

<div class="lang-toggle">
  <button class="lang-btn active" id="lang-es" onclick="setLang('es')">🇪🇸 Español primero</button>
  <button class="lang-btn" id="lang-en" onclick="setLang('en')">🇬🇧 English first</button>
</div>

<div class="category-scroll">
  <div class="cat-chip active" data-cat="all" onclick="setCategory('all')">🐾 Todos</div>
  <div class="cat-chip" data-cat="Domésticos" onclick="setCategory('Domésticos')">🏠 Domésticos</div>
  <div class="cat-chip" data-cat="Granja" onclick="setCategory('Granja')">🌾 Granja</div>
  <div class="cat-chip" data-cat="Salvajes" onclick="setCategory('Salvajes')">🌿 Salvajes</div>
  <div class="cat-chip" data-cat="Grandes" onclick="setCategory('Grandes')">🦁 Grandes</div>
  <div class="cat-chip" data-cat="Aves" onclick="setCategory('Aves')">🐦 Aves</div>
  <div class="cat-chip" data-cat="Marinos" onclick="setCategory('Marinos')">🌊 Marinos</div>
</div>

<div class="card-area">
  <div class="counter" id="counter">1 / 30</div>

  <div class="flip-wrapper" onclick="flipCard()">
    <div class="flip-card card-enter" id="flip-card">
      <div class="card-face card-front" id="card-front">
        <div class="card-emoji" id="card-emoji">🐶</div>
        <div class="card-name-es" id="card-name-main">Perro</div>
        <div class="card-category-dot" id="card-dot"></div>
      </div>
      <div class="card-face card-back" id="card-back">
        <div class="card-emoji" id="card-emoji-back">🐶</div>
        <div class="card-name-en" id="card-name-back">Dog</div>
        <div class="card-phonetic" id="card-phonetic">/dɒɡ/</div>
        <div class="card-fun-fact" id="card-fact">Los perros fueron los primeros animales domesticados por el ser humano 🐾</div>
      </div>
    </div>
  </div>

  <div class="flip-hint" id="flip-hint">Toca la tarjeta para ver en inglés ✨</div>

  <div class="audio-row">
    <button class="audio-btn audio-btn-es" id="btn-es" onclick="playAudio('es')">
      <span id="wave-es">
        <span class="wave-static">
          <span class="wb"></span><span class="wb"></span><span class="wb"></span><span class="wb"></span><span class="wb"></span>
        </span>
      </span>
      <span id="label-es">Escuchar ES</span>
    </button>
    <button class="audio-btn audio-btn-en" id="btn-en" onclick="playAudio('en')">
      <span id="wave-en">
        <span class="wave-static">
          <span class="wb"></span><span class="wb"></span><span class="wb"></span><span class="wb"></span><span class="wb"></span>
        </span>
      </span>
      <span id="label-en">Listen EN</span>
    </button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">←</button>
    <div class="progress-dots" id="progress-dots"></div>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">→</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // Domésticos
  { es:'Perro', en:'Dog', emoji:'🐶', cat:'Domésticos', phonetic:'/dɒɡ/', fact:'Los perros fueron los primeros animales domesticados 🐾' },
  { es:'Gato', en:'Cat', emoji:'🐱', cat:'Domésticos', phonetic:'/kæt/', fact:'Los gatos pueden girar las orejas 180 grados 😸' },
  { es:'Conejo', en:'Rabbit', emoji:'🐰', cat:'Domésticos', phonetic:'/ˈræbɪt/', fact:'Los conejos se limpian igual que los gatos 🐇' },
  { es:'Hámster', en:'Hamster', emoji:'🐹', cat:'Domésticos', phonetic:'/ˈhæmstər/', fact:'Los hámsteres pueden correr 8 km en una noche 🌙' },
  { es:'Pez', en:'Fish', emoji:'🐠', cat:'Domésticos', phonetic:'/fɪʃ/', fact:'Hay más de 30.000 especies de peces en el mundo 🌊' },
  // Granja
  { es:'Vaca', en:'Cow', emoji:'🐄', cat:'Granja', phonetic:'/kaʊ/', fact:'Las vacas tienen casi 360° de visión panorámica 👀' },
  { es:'Cerdo', en:'Pig', emoji:'🐷', cat:'Granja', phonetic:'/pɪɡ/', fact:'Los cerdos son más inteligentes que los perros 🧠' },
  { es:'Gallina', en:'Hen', emoji:'🐔', cat:'Granja', phonetic:'/hɛn/', fact:'Las gallinas tienen más de 30 tipos de vocalizaciones 🎶' },
  { es:'Caballo', en:'Horse', emoji:'🐴', cat:'Granja', phonetic:'/hɔːrs/', fact:'Los caballos solo duermen unas 3 horas al día 😴' },
  { es:'Oveja', en:'Sheep', emoji:'🐑', cat:'Granja', phonetic:'/ʃiːp/', fact:'Las ovejas pueden reconocer hasta 50 caras de compañeros 😊' },
  // Salvajes
  { es:'Zorro', en:'Fox', emoji:'🦊', cat:'Salvajes', phonetic:'/fɒks/', fact:'Los zorros usan el campo magnético de la Tierra para cazar ✨' },
  { es:'Lobo', en:'Wolf', emoji:'🐺', cat:'Salvajes', phonetic:'/wʊlf/', fact:'Los lobos tienen mandíbulas 10 veces más poderosas que los perros 💪' },
  { es:'Oso', en:'Bear', emoji:'🐻', cat:'Salvajes', phonetic:'/bɛər/', fact:'Los osos pardos pueden correr a 50 km/h 🏃' },
  { es:'Ciervo', en:'Deer', emoji:'🦌', cat:'Salvajes', phonetic:'/dɪər/', fact:'Los cuernos de los ciervos crecen más rápido que cualquier tejido animal 🌱' },
  { es:'Jabalí', en:'Boar', emoji:'🐗', cat:'Salvajes', phonetic:'/bɔːr/', fact:'Los jabalíes tienen un olfato 2.000 veces más potente que el humano 👃' },
  // Grandes/Llamativos
  { es:'León', en:'Lion', emoji:'🦁', cat:'Grandes', phonetic:'/ˈlaɪən/', fact:'El rugido de un león se puede escuchar a 8 km de distancia 📢' },
  { es:'Elefante', en:'Elephant', emoji:'🐘', cat:'Grandes', phonetic:'/ˈɛlɪfənt/', fact:'Los elefantes son los únicos animales que no pueden saltar 😄' },
  { es:'Jirafa', en:'Giraffe', emoji:'🦒', cat:'Grandes', phonetic:'/dʒɪˈrɑːf/', fact:'La lengua de la jirafa mide 45 centímetros 😮' },
  { es:'Cebra', en:'Zebra', emoji:'🦓', cat:'Grandes', phonetic:'/ˈziːbrə/', fact:'Las rayas de cada cebra son únicas como las huellas dactilares 🤩' },
  { es:'Hipopótamo', en:'Hippo', emoji:'🦛', cat:'Grandes', phonetic:'/ˈhɪpəʊ/', fact:'Los hipopótamos segregan un líquido rosado que actúa como protector solar 🌞' },
  // Aves
  { es:'Pato', en:'Duck', emoji:'🦆', cat:'Aves', phonetic:'/dʌk/', fact:'El cuac de los patos no hace eco... ¡o sí! 🎵' },
  { es:'Búho', en:'Owl', emoji:'🦉', cat:'Aves', phonetic:'/aʊl/', fact:'Los búhos no pueden mover los ojos, pero sí su cabeza 270° 🔄' },
  { es:'Loro', en:'Parrot', emoji:'🦜', cat:'Aves', phonetic:'/ˈpærət/', fact:'Los loros africanos grises pueden aprender más de 1.000 palabras 🗣️' },
  { es:'Pingüino', en:'Penguin', emoji:'🐧', cat:'Aves', phonetic:'/ˈpɛŋɡwɪn/', fact:'Los pingüinos se proponen "matrimonio" ofreciendo una piedra 💍' },
  { es:'Flamenco', en:'Flamingo', emoji:'🦩', cat:'Aves', phonetic:'/fləˈmɪŋɡəʊ/', fact:'Los flamencos son rosados por los carotenoides de su comida 🦐' },
  // Marinos
  { es:'Delfín', en:'Dolphin', emoji:'🐬', cat:'Marinos', phonetic:'/ˈdɒlfɪn/', fact:'Los delfines tienen nombre propio: se llaman entre sí con silbidos únicos 🎶' },
  { es:'Tiburón', en:'Shark', emoji:'🦈', cat:'Marinos', phonetic:'/ʃɑːrk/', fact:'Los tiburones son más antiguos que los dinosaurios 🦕' },
  { es:'Pulpo', en:'Octopus', emoji:'🐙', cat:'Marinos', phonetic:'/ˈɒktəpəs/', fact:'Los pulpos tienen tres corazones y sangre azul 💙' },
  { es:'Ballena', en:'Whale', emoji:'🐋', cat:'Marinos', phonetic:'/weɪl/', fact:'Las ballenas jorobadas componen canciones nuevas cada año 🎼' },
  { es:'Tortuga', en:'Turtle', emoji:'🐢', cat:'Marinos', phonetic:'/ˈtɜːrtl/', fact:'Algunas tortugas marinas viven más de 100 años ⏳' },
];

const CAT_COLORS = {
  Domésticos: '#FF8FAB',
  Granja: '#FFB347',
  Salvajes: '#F97B4B',
  Grandes: '#C084FC',
  Aves: '#72D6C9',
  Marinos: '#60A5FA',
};
const CAT_ACCENT_CLASS = {
  Domésticos: 'accent-domesticos',
  Granja: 'accent-granja',
  Salvajes: 'accent-salvajes',
  Grandes: 'accent-grandes',
  Aves: 'accent-aves',
  Marinos: 'accent-marinos',
};

let currentLang = 'es';
let currentCategory = 'all';
let filteredCards = [...ALL_CARDS];
let currentIndex = 0;
let isFlipped = false;
let seenCards = new Set();

function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-es').classList.toggle('active', lang === 'es');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  const hint = document.getElementById('flip-hint');
  hint.textContent = lang === 'es' ? 'Toca la tarjeta para ver en inglés ✨' : 'Tap card to see in Spanish ✨';
  renderCard(false);
}

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === cat);
  });
  filteredCards = cat === 'all' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === cat);
  currentIndex = 0;
  seenCards = new Set();
  renderCard(true);
  renderDots();
}

function renderCard(animate) {
  const card = filteredCards[currentIndex];
  if (!card) return;
  seenCards.add(currentIndex);

  // Reset flip
  isFlipped = false;
  const fc = document.getElementById('flip-card');
  fc.classList.remove('flipped');

  // Accent color
  const accentClass = CAT_ACCENT_CLASS[card.cat] || '';
  document.getElementById('card-front').className = `card-face card-front ${accentClass}`;
  document.getElementById('card-back').className = `card-face card-back ${accentClass}`;

  // Dot color
  const dot = document.getElementById('card-dot');
  dot.style.background = CAT_COLORS[card.cat] || '#ccc';

  if (currentLang === 'es') {
    document.getElementById('card-emoji').textContent = card.emoji;
    document.getElementById('card-name-main').textContent = card.es;
    document.getElementById('card-emoji-back').textContent = card.emoji;
    document.getElementById('card-name-back').textContent = card.en;
  } else {
    document.getElementById('card-emoji').textContent = card.emoji;
    document.getElementById('card-name-main').textContent = card.en;
    document.getElementById('card-emoji-back').textContent = card.emoji;
    document.getElementById('card-name-back').textContent = card.es;
  }

  document.getElementById('card-phonetic').textContent = card.phonetic;
  document.getElementById('card-fact').textContent = card.fact;
  document.getElementById('counter').textContent = `${currentIndex + 1} / ${filteredCards.length}`;

  if (animate) {
    fc.classList.remove('card-enter');
    void fc.offsetWidth;
    fc.classList.add('card-enter');
  }

  // Nav buttons
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === filteredCards.length - 1;

  renderDots();
}

function renderDots() {
  const container = document.getElementById('progress-dots');
  const max = Math.min(filteredCards.length, 15);
  container.innerHTML = '';
  for (let i = 0; i < max; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentIndex ? ' active' : '') + (seenCards.has(i) && i !== currentIndex ? ' seen' : '');
    dot.onclick = () => { currentIndex = i; renderCard(true); };
    container.appendChild(dot);
  }
  if (filteredCards.length > 15) {
    const more = document.createElement('div');
    more.style.cssText = 'font-size:11px;color:#3D2A1E;opacity:0.4;font-family:Poppins;';
    more.textContent = `+${filteredCards.length - 15}`;
    container.appendChild(more);
  }
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flip-card').classList.toggle('flipped', isFlipped);
  const hint = document.getElementById('flip-hint');
  hint.textContent = isFlipped
    ? (currentLang === 'es' ? 'Toca para volver al español 🔄' : 'Tap to go back 🔄')
    : (currentLang === 'es' ? 'Toca la tarjeta para ver en inglés ✨' : 'Tap card to see in Spanish ✨');
}

function navigate(dir) {
  const next = currentIndex + dir;
  if (next < 0 || next >= filteredCards.length) return;
  currentIndex = next;
  renderCard(true);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// Touch swipe
let touchStartX = 0;
document.querySelector('.flip-wrapper').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.querySelector('.flip-wrapper').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    navigate(dx < 0 ? 1 : -1);
  } else {
    flipCard();
  }
}, { passive: true });

// Audio via Web Speech API
let currentUtterance = null;
function playAudio(lang) {
  if (!window.speechSynthesis) {
    alert('Tu navegador no soporta síntesis de voz. Prueba en Chrome o Safari 🎙️');
    return;
  }

  const card = filteredCards[currentIndex];
  const text = lang === 'es' ? card.es : card.en;
  const voiceLang = lang === 'es' ? 'es-ES' : 'en-US';
  const btnId = lang === 'es' ? 'btn-es' : 'btn-en';
  const waveId = lang === 'es' ? 'wave-es' : 'wave-en';
  const labelId = lang === 'es' ? 'label-es' : 'label-en';
  const labelText = lang === 'es' ? 'Escuchar ES' : 'Listen EN';

  if (currentUtterance) {
    window.speechSynthesis.cancel();
    currentUtterance = null;
  }

  const btn = document.getElementById(btnId);
  const wave = document.getElementById(waveId);
  const label = document.getElementById(labelId);

  // Animated wave
  wave.innerHTML = `<span class="wave"><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span></span>`;
  label.textContent = lang === 'es' ? '...' : '...';
  btn.classList.add('playing');

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = voiceLang;
  utterance.rate = 0.85;
  utterance.pitch = 1.1;

  // Try to pick a child-friendly voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith(lang === 'es' ? 'es' : 'en') && v.name.toLowerCase().includes('female'))
    || voices.find(v => v.lang.startsWith(lang === 'es' ? 'es' : 'en'));
  if (preferred) utterance.voice = preferred;

  utterance.onend = () => {
    wave.innerHTML = `<span class="wave-static"><span class="wb"></span><span class="wb"></span><span class="wb"></span><span class="wb"></span><span class="wb"></span></span>`;
    label.textContent = labelText;
    btn.classList.remove('playing');
    currentUtterance = null;
  };

  utterance.onerror = () => {
    wave.innerHTML = `<span class="wave-static"><span class="wb"></span><span class="wb"></span><span class="wb"></span><span class="wb"></span><span class="wb"></span></span>`;
    label.textContent = labelText;
    btn.classList.remove('playing');
    currentUtterance = null;
  };

  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

// Init
window.speechSynthesis && window.speechSynthesis.getVoices(); // preload
renderCard(false);
renderDots();
</script>
</body>
</html>
